name: Deploy Containerized ML Lambda

on:
  push:
    branches:
      - main
    paths:
      - 'src/deployment/predict_price.py'
      - 'src/model_engineering/train_models.py'
      - 'src/deployment/Dockerfile'

jobs:
  deploy-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1

      - name: Download trained models from S3
        run: |
          mkdir -p models
          aws s3 cp s3://konrad-ds-project-data/models/ models/ --recursive

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, Tag, and Push Docker Image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: car-valuation-lambda
          IMAGE_TAG: latest
        run: |
          # Budujemy obraz wskazując na kontekst folderu deployment (gdzie jest Dockerfile)
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -f src/deployment/Dockerfile .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Update AWS Lambda with New Image
        run: |
          aws lambda update-function-code \
            --function-name car-valuation-api \
            --image-uri 575210791768.dkr.ecr.eu-central-1.amazonaws.com/car-valuation-lambda:latest